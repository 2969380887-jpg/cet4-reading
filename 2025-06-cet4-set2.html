function lw(raw){
  var c=raw.replace(/[.,;:!?—\-–—'"()\[\]{}«»\/\\\\]+$/g,'').replace(/^[.,;:!?—\-–—'"()\[\]{}«»\/\\\\]+/g,'');
  if(!c||c.length<1)return null;
  var k=c.toLowerCase();
  if(D2[k])return D2[k];
  if(k.endsWith('s')&&k.length>3){var s=k.slice(0,-1);if(D2[s])return D2[s]}
  if(k.endsWith('ing')&&k.length>5){var b=k.slice(0,-3);if(D2[b])return D2[b];var b2=b+'e';if(D2[b2])return D2[b2]}
  if(k.endsWith('ed')&&k.length>4){var b=k.slice(0,-2);if(D2[b])return D2[b];if(k.endsWith('ied')&&k.length>5){var ib=k.slice(0,-3)+'y';if(D2[ib])return D2[ib]}}
  if(k.endsWith('ly')&&k.length>4){var b=k.slice(0,-2);if(D2[b])return D2[b]}
  if(k.endsWith('er')&&k.length>4){var b=k.slice(0,-2);if(D2[b])return D2[b]}
  return null;
}

function wx(text){
  var tokens=text.split(/(\s+)/g);
  var h='';
  for(var ti=0;ti<tokens.length;ti++){
    var tok=tokens[ti];
    if(/^\s+$/.test(tok)){h+=tok;continue}
    var m=tok.match(/^([^a-zA-Z0-9]*)([a-zA-Z0-9'-]+?)([^a-zA-Z0-9]*)$/);
    if(m){
      h+=esh(m[1]);var w=m[2],pc=m[3];
      if(/[a-zA-Z]/.test(w)&&w.length>=1){
        var e=lw(w);
        h+='<span class="w" data-w="'+esh(w)+'" data-p="'+esh(e?e.p:'')+'" data-d="'+esh(e?e.d:'(基础词汇)')+'">'+esh(w)+'</span>';
      }else{h+=esh(w)}
      h+=esh(pc);
    }else{h+=esh(tok)}
  }
  return h;
}
function esh(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
