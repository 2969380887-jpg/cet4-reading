function lw(raw){
  var c=raw.replace(/[.,;:!?—\-–—'"()\\[\\]{}«»\/\\\\]+$/g,'').replace(/^[.,;:!?—\-–—'"()\\[\\]{}«»\/\\\\]+/g,'');
  if(!c||c.length<1)return null;
  var k=c.toLowerCase();
  if(D2[k])return D2[k];
  if(k.endsWith('s')&&k.length>3){var s=k.slice(0,-1);if(D2[s])return D2[s]}
  if(k.endsWith('ing')&&k.length>5){var b=k.slice(0,-3);if(D2[b])return D2[b];var b2=b+'e';if(D2[b2])return D2[b2]}
  if(k.endsWith('ed')&&k.length>4){var b=k.slice(0,-2);if(D2[b])return D2[b];if(k.endsWith('ied')&&k.length>5){var ib=k.slice(0,-3)+'y';if(D2[ib])return D2[ib]}}
  if(k.endsWith('ly')&&k.length>4){var b=k.slice(0,-2);if(D2[b])return D2[b]}
  if(k.endsWith('er')&&k.length>4){var b=k.slice(0,-2);if(D2[b])return D2[b]}
  return null;
}

function wx(text){
  var tokens=text.split(/(\s+)/g);
  var h='';
  for(var ti=0;ti<tokens.length;ti++){
    var tok=tokens[ti];
    if(/^\s+$/.test(tok)){h+=tok;continue}
    var m=tok.match(/^([^a-zA-Z0-9]*)([a-zA-Z0-9'-]+?)([^a-zA-Z0-9]*)$/);
    if(m){
      h+=esh(m[1]);var w=m[2],pc=m[3];
      if(/[a-zA-Z]/.test(w)&&w.length>=1){
        var e=lw(w);
        h+='<span class="w" data-w="'+esh(w)+'" data-p="'+esh(e?e.p:'')+'" data-d="'+esh(e?e.d:'(基础词汇)')+'">'+esh(w)+'</span>';
      }else{h+=esh(w)}
      h+=esh(pc);
    }else{h+=esh(tok)}
  }
  return h;
}

"Finding someone you're committed to outcompeting can be a great way to stay focused on your goals and push your venture to the next level. But when you're intently focused on outperforming your rivals, you may begin to develop a 'win-at-all-costs' mentality that causes you to ignore how you achieve success. One group of researchers, for example, examined the link between rivalry and unethical behavior. They found that when people compete against their rivals, they are more willing to behave unethically to win. But such behavior may stain your reputation and strain relationships important to your success. One way to avoid this trap is to stop and reflect on what's important. While outperforming your rivals may provide short-term benefits, the loss of your integrity will have long-term consequences.",
"One reason having a rival can enhance your venture's performance is that it creates a level of excitement that drives you to work harder. But this eagerness to win may also hurt your venture's success, particularly when it causes you to make impulsive, insensible decisions. But it's possible to avoid such costly mistakes by making a habit of engaging in critical thinking, such as considering opposing viewpoints and conducting cost-benefit analyses, especially for those decisions that are complex and can determine the future of your venture.",
"The sense of eagerness that comes with having a rival can not only cause you to make poorer decisions, but it can also lead you to take greater risks that put your venture in peril. One way you can overcome the risk-inducing effects of rivalry that stand to endanger your venture's success is to remain attentive to your emotional state and actively monitor how such feelings are affecting your decision-making."
];

"A multitasker is one who can perform two or more tasks effectively at the same time, which — apart from the obvious differences — is similar to what a computer does. The concept does indeed come from the realms of technology, where it is used to refer to an operating system that can execute multiple tasks at the same time. However, the question is: can a person really be a multitasker?",
"For most scientists, the answer is no. So much so that, according to experts in neuroscience, our brains do not handle multitasking situations well. As soon as two tasks require our attention, productivity falls. Our so-called multitasking is, therefore, the ability to switch, more or less quickly, between different tasks. This requires two fundamental conditions: one of the tasks must be automated, like walking or eating; and both tasks need to involve different mental processes. For example, talking on the phone while writing.",
"However, on the other side of the coin, there are people who insist that multitasking is possible, or at least appears to be. A recent study concluded that, whether or not people are actually multitasking, the mere fact of perceiving the activity as multitasking has a positive impact on their performance.",
"The business perspective offers a different view: multitasking is understood as the ability to adapt to various environments within a company and efficiently carry out different activities within a set timeframe. In fact, many companies look for people talented in multitasking to improve their productivity. From this different viewpoint, not only can you multitask, but this ability can be taught — something that can be more easily achieved in fluid organizations that promote flexible approaches to work.",
"The benefits of multitasking are evident. Being faster and more efficient improves our performance and the quantity of tasks we complete. But having to pay attention to several things at once means our level of concentration decreases, which leads to more errors."
