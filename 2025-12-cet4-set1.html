var DATA={"file":"2025-12-cet4-set1.html","dateTitle":"2025年12月","dateShort":"2025.12","set":"第1套","p1Small":"服药时间","p2Small":"延迟退休","p1Title":"Timing Medicines","p2Title":"Working into the Seventies","saPars":["People tend to want as many choices as possible. They believe this will maximize their __26__ of making the best decision. But research shows that, when it comes to actually making a __27__ from all of these choices, people can become __28__ and avoid making a decision altogether. Even worse, when people finally do decide, they are generally less satisfied with their decision and feel more regretful over whatever choice they made.","Why does this happen? Research shows that when people choose from many options, they __29__ more in the decision, but feel less confident in their ability to decide well. In other words, when we are __30__ with more choices, making the right or correct decision begins to feel more __31__ and, at the same time, more difficult to do. This may contribute to the deep fear that we will make the wrong decision.","How can we solve this problem? I believe this fear could be tempered by putting decisions into perspective. It might help to remember that many of the choices you make, such as what to have for lunch, will not __32__ much in the future and that, even more important choices, like accepting a new job, can __33__ be changed. It could also help to __34__ these situations with clear guidelines and ideas of what you want from the __35__ of options, which can narrow the possible choices, and also make you more confident about your ability to make the right decision."],"saTr":["人们往往希望拥有尽可能多的选择。他们相信，这会最大限度提高自己作出最佳决定的机会。但研究表明，当真正需要从所有这些选项中作出选择时，人们可能会感到困惑，甚至干脆逃避决定。更糟的是，当人们最终作出决定时，他们通常对决定不那么满意，也会对自己的选择感到更多后悔。","为什么会这样？研究表明，当人们从许多选项中选择时，他们会在决定中投入更多，却对自己作出好决定的能力更缺乏信心。换句话说，当我们面对更多选择时，作出“正确”的决定开始显得更加关键，同时也更加困难。这可能加深我们对作出错误决定的恐惧。","怎样解决这个问题？我认为，可以通过正确看待决定的重要性来缓和这种恐惧。记住这一点可能会有帮助：你作出的许多选择，比如午餐吃什么，将来并不会有多重要；即便是接受新工作之类更重要的选择，最终也可以改变。带着清晰的准则，以及自己想从这一系列选项中获得什么的明确想法进入这些情境，也会有所帮助。这样可以缩小可能的选择范围，并让你对作出正确决定的能力更有信心。"],"bank":["A) approximately","B) case","C) chance","D) confused","E) crucial","F) deposited","G) enter","H) invest","I) matter","J) presented","K) range","L) regular","M) seize","N) selection","O) ultimately"],"p1Pars":["All living organisms on Earth are exposed to a 24-hour day-night cycle. This cycle is the reason why people rest at night and are active during the day. Consequently, all human body functions also follow this daily rhythm, and the timing of behaviors like exercise or food intake can significantly influence your health. For example, eating at night can lead to weight gain over time because food intake at night leads to increased fat storage.","Many drug targets in the body follow a 24-hour cycle, too. This means that the specific proteins a drug is designed to modify can react differently to the medicine over the course of a 24-hour time period. Because how the body responds to a drug can differ depending on the time it is taken, it logically follows that taking medicines at specific times could help increase their effectiveness and reduce unwanted side effects.","When doctors prescribe medicine for people, they rarely consider the best time to take it. There are two main reasons for that oversight. First, many physicians are not aware that some drugs work better during a specific time of the day. And second, most drugs have not been studied for possible different effects during a 24-hour cycle. Therefore, patients are directed to take most drugs during the morning or evening primarily to ensure compliance.","Over 50 years ago, researchers found that the cholesterol drug simvastatin is more effective at lowering cholesterol levels when taken at night rather than during the day. This is because the liver enzyme these drugs target is more active at night.","Taking medicine at the wrong time can even cause harm. My colleagues and I wondered whether midazolam, the most common sedative used in surgical procedures worldwide, might interfere with the internal clock that protects the heart at night. Currently, there are no guidelines regarding when midazolam should be administered.","More research is needed to determine the best times to administer treatments for different diseases. I believe taking drug timing into account could help make treatments more effective and help more people worldwide."],"p1Tr":["地球上所有生物都受到24小时昼夜循环的影响。正是这一循环让人们夜间休息、白天活动。因此，人体所有功能也遵循这种日常节律，而运动或进食等行为发生的时间会显著影响健康。例如，夜间进食会增加脂肪储存，久而久之可能导致体重增加。","人体中的许多药物靶点也遵循24小时周期。这意味着，一种药物被设计用来改变的特定蛋白质，在一天24小时中对药物的反应可能不同。由于身体对药物的反应会随服用时间而变化，合乎逻辑的结论是，在特定时间服药可能有助于提高疗效并减少不良副作用。","医生为人们开药时，很少考虑最佳服药时间。这种忽视主要有两个原因。第一，许多医生不知道某些药物在一天中的特定时间效果更好。第二，多数药物并没有针对24小时周期内可能存在的不同效果进行研究。因此，医生通常让患者在早晨或晚上服用大多数药物，主要是为了确保患者按要求服药。","50多年前，研究人员发现，降胆固醇药物辛伐他汀在夜间服用时，比白天服用更能有效降低胆固醇水平。这是因为这些药物针对的肝酶在夜间更活跃。","在错误时间服药甚至会造成伤害。我和同事曾思考，全球手术中最常用的镇静剂咪达唑仑，是否会干扰夜间保护心脏的内部时钟。目前，对于何时应该使用咪达唑仑还没有指导原则。","还需要更多研究来确定治疗不同疾病的最佳给药时间。我认为，把服药时间纳入考虑，可以让治疗更有效，并帮助世界各地更多的人。"],"p1Questions":[{"id":46,"text":"46. What do we learn from the passage about the timing of our behaviors?","qtr":"关于行为发生的时间，我们从文章中了解到什么？","opts":[["A) It has a considerable impact on our health.","它对我们的健康有很大影响。"],["B) It confines us to a 24-hour day-night cycle.","它把我们限制在24小时昼夜循环中。"],["C) It requires us to follow a particular rhythm.","它要求我们遵循特定节律。"],["D) It holds the key to all human body functions.","它是所有人体功能的关键。"]]},{"id":47,"text":"47. What does the author say about the proteins in our body?","qtr":"作者如何描述人体内的蛋白质？","opts":[["A) They can modify the effects of medicines in different ways.","它们能以不同方式改变药物效果。"],["B) They can reduce unwanted side effects of certain medicines.","它们能减少某些药物的不良副作用。"],["C) Their reaction to medicines changes during the day-night cycle.","它们对药物的反应会在昼夜循环中变化。"],["D) Their design determines how differently they react to medicines.","它们的设计决定其对药物反应的差异。"]]},{"id":48,"text":"48. What do doctors do when prescribing medicine for people?","qtr":"医生为人们开药时会怎么做？","opts":[["A) They give little thought to the time of taking it for maximum effect.","他们很少考虑为获得最大疗效而选择服药时间。"],["B) They rarely consider which medicine works better for which patient.","他们很少考虑哪种药更适合哪位患者。"],["C) They tell patients its possible side effects during a period of 24 hours.","他们告诉患者药物在24小时内可能产生的副作用。"],["D) They tell patients to comply with the directions of drug manufacturers.","他们让患者遵守药品制造商的说明。"]]},{"id":49,"text":"49. Why do doctors advise patients to take most drugs in the morning or in the evening?","qtr":"医生为什么建议患者在早晨或晚上服用大多数药物？","opts":[["A) To discourage them from making complaints.","为了阻止他们抱怨。"],["B) To ensure they take the drugs as instructed.","为了确保他们按要求服药。"],["C) To comply with new research findings strictly.","为了严格遵循新的研究发现。"],["D) To guarantee the maximum effect of the drugs.","为了保证药物发挥最大效果。"]]},{"id":50,"text":"50. What does the author suggest near the end of the passage?","qtr":"作者在文章结尾附近提出了什么建议？","opts":[["A) Considering drug-taking timing when prescribing drugs for patients.","为患者开药时考虑服药时间。"],["B) Making treatments less complex by taking drug timing into account.","通过考虑服药时间降低治疗复杂度。"],["C) Conducting more studies to find out the best timing for treating different diseases.","开展更多研究，找出治疗不同疾病的最佳时间。"],["D) Finding out the most effective drugs for treating diseases through further research.","通过进一步研究找出治疗疾病最有效的药物。"]]}],"p2Pars":["Katharine Abraham, an economics professor, was chatting with her hairdresser about retirement plans. The economist said she plans to continue working because she wants to. The hairdresser agreed but for a different reason: She needs the money.","Both scenarios are contributing to a big increase in the number of people in the US working into their 70s. Over the past 20 years, the share of Americans working in their 70s has risen from less than 10% to nearly 15%.","In addition to people being healthier and living much longer, economists say that a combination of financial considerations such as years of slow rise in real wages and a shift away from traditional pensions in the private sector are some of the reasons people delay retirement. The decline of manufacturing and the increase in the number of people working in less labor-intensive occupations also has contributed to the trend, says Abraham, who researches work and retirement decisions of older Americans.","Which matters more depends on what your history up until that point has been in the type of work you are doing, Abraham says.","The overall trend is hitting Americans of all different levels of educational attainment, although the percentages vary by category. The share of Americans with bachelor's degrees who were working into their 70s reached nearly 20% in 2018. For those with a high school degree or less, the proportion of those working in their 70s had risen to around 10%, while those with some college education were in the middle at around 15%.","Martin Neil Baily, an economist who is leading a research project on retirement security, notes that quitting a career can lead to feelings of isolation and loneliness, particularly for men. He suggests that many college-educated workers are choosing to stay in the labor force more for social benefits than for financial reasons. They are also more likely to be in professional occupations where they tend to enjoy their work more.","Workers in more physical jobs, meanwhile, may be more likely to look forward to retiring, Baily says, suggesting those who stay on are more likely doing so for financial reasons."],"p2Tr":["经济学教授凯瑟琳·亚伯拉罕曾与她的理发师聊退休计划。这位经济学家说，她打算继续工作，因为她愿意这样做。理发师也打算继续工作，但原因不同：她需要钱。","这两种情况都在推动美国工作到七十多岁的人数大幅增加。在过去20年里，七十多岁仍工作的美国人比例从不足10%上升到接近15%。","经济学家说，除了人们更健康、寿命更长之外，多种财务因素也是人们推迟退休的原因，例如实际工资多年来增长缓慢，以及私营部门逐渐不再采用传统养老金制度。研究美国老年人工作与退休决定的亚伯拉罕还表示，制造业衰退以及从事劳动强度较低职业的人数增加，也推动了这一趋势。","亚伯拉罕说，哪种因素更重要，取决于一个人在此前人生中从事的工作类型。","这一总体趋势影响着不同教育水平的美国人，尽管各类别比例不同。2018年，拥有学士学位且工作到七十多岁的美国人比例接近20%。高中学历或以下人群中，这一比例上升到约10%；受过部分大学教育的人则居中，约为15%。","正在领导退休保障研究项目的经济学家马丁·尼尔·贝利指出，离开职业生涯可能带来孤立和孤独感，男性尤其如此。他认为，许多受过大学教育的劳动者选择留在劳动力市场，更多是为了社会交往方面的好处，而不是财务原因。他们也更可能从事专业性职业，并且往往更享受自己的工作。","贝利说，与此同时，从事体力工作的人可能更期待退休；而继续工作的人更可能是出于财务原因。"],"p2Questions":[{"id":51,"text":"51. What do we learn from the passage about the economics professor and her hairdresser?","qtr":"关于经济学教授和她的理发师，我们从文章中了解到什么？","opts":[["A) They differ in their reasons for continuing to work.","她们继续工作的原因不同。"],["B) They are both committed to working into their 70s.","她们都决心工作到七十多岁。"],["C) They are happy about their current financial situation.","她们对当前财务状况感到满意。"],["D) They hold different views about postponing retirement.","她们对推迟退休持不同看法。"]]},{"id":52,"text":"52. What is one of the reasons for people to delay retirement?","qtr":"人们推迟退休的一个原因是什么？","opts":[["A) More and more people have switched to less intellectually challenging jobs.","越来越多人转向智力挑战较低的工作。"],["B) The number of jobs suitable for older people has increased in the private sector.","私营部门适合老年人的工作增加了。"],["C) The rate of wage increase in terms of purchasing power has slowed down for years.","以购买力衡量的工资增长速度多年来一直放缓。"],["D) More and more people in the workplace find it hard to rely on traditional pensions.","越来越多职场人士发现难以依靠传统养老金。"]]},{"id":53,"text":"53. What is the general trend in people delaying retirement?","qtr":"人们推迟退休的总体趋势是什么？","opts":[["A) The higher their earnings, the more likely they are tempted to delay retirement.","收入越高，越可能被吸引推迟退休。"],["B) Those who have more job satisfaction tend to retire later than those who have less.","工作满意度更高的人往往退休更晚。"],["C) More men than women are likely to stay in the labor force until their late seventies.","男性比女性更可能工作到七十多岁末期。"],["D) The higher their educational level, the more likely they are to delay retirement.","教育水平越高，越可能推迟退休。"]]},{"id":54,"text":"54. What is the chief reason for college-educated workers delaying retirement according to an economist?","qtr":"据一位经济学家说，受过大学教育的劳动者推迟退休的主要原因是什么？","opts":[["A) Enjoying financial security.","享受财务保障。"],["B) Staying connected socially.","保持社会联系。"],["C) Contributing more professionally.","在专业上作出更多贡献。"],["D) Increasing social security payments.","增加社会保障金。"]]},{"id":55,"text":"55. What does the passage say about people doing manual work?","qtr":"文章如何描述从事体力工作的人？","opts":[["A) They are eager to enjoy life after retiring.","他们渴望退休后享受生活。"],["B) They are likely to have financial troubles.","他们可能有财务困难。"],["C) They generally do not enjoy doing it.","他们通常不喜欢做这类工作。"],["D) They tend to anticipate retirement.","他们往往期待退休。"]]}]};
function transButton(id,short){return '<button class="tt" data-short="'+(short?'1':'0')+'" onclick="event.stopPropagation();ttg(\''+id+'\',this)"><span class="ar">▶</span> <span class="lbl">'+(short?'译':'查看翻译')+'</span></button>'}
function renderParas(pars,trs,prefix,blanks){var h='';for(var i=0;i<pars.length;i++){var ph=wx(pars[i]);if(blanks){for(var n=26;n<=35;n++)ph=ph.replace('__'+n+'__','<span style="display:inline-block;min-width:1.8em;border-bottom:2px solid var(--accent);text-align:center;margin:0 2px;font-weight:700;color:var(--accent)">'+n+'</span>')}var id='tr-'+prefix+'-'+i;h+='<div class="p">'+ph+'</div>'+transButton(id,false)+'<div class="tx" id="'+id+'">'+esh(trs[i])+'</div>'}return h}
function mq(q){var h='<div class="qb"><div class="qt">'+wx(q.text)+'</div>';var qid='tr-q'+q.id;h+=transButton(qid,false)+'<div class="tx" id="'+qid+'">'+esh(q.qtr)+'</div><div class="og">';for(var i=0;i<q.opts.length;i++){var id='tr-q'+q.id+'-o'+i;h+='<div class="op">'+wx(q.opts[i][0])+' '+transButton(id,true)+'<div class="tx" id="'+id+'">'+esh(q.opts[i][1])+'</div></div>'}return h+'</div></div>'}
document.getElementById('sap').innerHTML=renderParas(DATA.saPars,DATA.saTr,'sa',true);document.getElementById('sab').innerHTML=DATA.bank.map(function(x){return '<span>'+wx(x)+'</span>'}).join(' ');document.getElementById('p1c').innerHTML=renderParas(DATA.p1Pars,DATA.p1Tr,'p1',false);document.getElementById('p2c').innerHTML=renderParas(DATA.p2Pars,DATA.p2Tr,'p2',false);document.getElementById('p1q').innerHTML=DATA.p1Questions.map(mq).join('');document.getElementById('p2q').innerHTML=DATA.p2Questions.map(mq).join('');
</script>
