var DATA={"file":"2024-12-cet4-set1.html","dateTitle":"2024年12月","dateShort":"2024.12","set":"第1套","p1Small":"人与自然","p2Small":"女性工程师","p1Title":"Human Connection to Nature","p2Title":"Women Engineers","saPars":["When Toni Morrison died in 2019, the world lost one of its most influential authors. But Morrison was not an early success. Her first novel was not published until she was 39, and her last appeared when she was 84. And Morrison was not __26__ in this regard. Numerous writers produce masterpieces well into their 70s and beyond. Such __27__ accomplishments highlight an important point. Our capacity to speak, write and learn new vocabulary does not seem to __28__ with age. Our eyesight may dim and our recall may weaken, but, by comparison, our ability to produce and to __29__ language is well preserved into older adulthood.","Indeed, the latest research that has emerged on language and aging shows that language mastery is a __30__ that we begin as infants and continue on for the rest of our lives. Some aspects of our language abilities, such as our knowledge of word meanings, __31__ improve during middle and late adulthood. One study, for example, found that adults over sixty had an average vocabulary size of over 21,000 words. The researchers also studied a __32__ of college students and found that their average vocabulary contained __33__ 16,000 words.","In another study, older adults, with an average age of 75, __34__ better than participants in their youth or middle years on tasks that required them to determine the meaning of words. Thus, language seems to be a skill that, contrary to what many might __35__, does not weaken with age."],"saTr":["2019年托妮·莫里森去世时，世界失去了一位最有影响力的作家。但莫里森并不是很早就取得成功。她的第一部小说直到39岁才出版，最后一部作品则在84岁时问世。在这一点上，莫里森并非个例。许多作家在七十多岁甚至更晚仍能创作出杰作。这些文学成就凸显了一个重要观点：我们说话、写作和学习新词汇的能力似乎并不会随年龄增长而衰退。我们的视力可能会变弱，记忆提取能力可能会下降，但相比之下，我们生成和理解语言的能力在老年阶段仍能很好地保留下来。","事实上，关于语言与衰老的最新研究表明，语言掌握是一段旅程：它始于婴儿时期，并持续我们的一生。语言能力的某些方面，比如对词义的了解，实际上会在中年和晚年继续提高。例如，一项研究发现，60岁以上成年人的平均词汇量超过21000个词。研究人员还研究了一组大学生，发现他们的平均词汇量约为16000个词。","另一项研究中，平均年龄75岁的老年人在需要判断词义的任务上，表现优于青年或中年参与者。因此，语言似乎是一项技能，与许多人可能认为的相反，它并不会随着年龄增长而减弱。"],"bank":["A) actually","B) approximately","C) assume","D) component","E) comprehend","F) deteriorate","G) equivalent","H) journey","I) literary","J) performed","K) rarely","L) sample","M) undermined","N) unique","O) unit"],"p1Pars":["The weakening of the human connection to nature might be good for economic growth but is bad for people. A tipping point was reached in 2020 when human-made materials such as steel, concrete and plastic were found to weigh more than all life on Earth. Continuing to grow concrete forests rather than real ones is shortsighted. Simply being in the nearest wood has such health benefits that the Woodland Trust successfully lobbied for it to be prescribed by doctors.","Yet slipping from popular culture is the wonder and beauty of the natural world. For every three nature-related words in hit songs of the 1950s, researchers found, there was only slightly more than one 50 years later. It is not a moment too soon that teenagers will be able to take a natural history test, given that for decades children have been able to name more video game characters than wildlife species.","Part of remedying this social disease would be for parliament to pass a right to grow law, allowing anyone to turn underused public spaces into vegetable and fruit gardens. The idea is for people to get back in touch with the soil while producing food sustainably.","Vegetable planting has a respectable tradition. In April 1649, locals responded to high prices and food shortages by cultivating vegetables on common land in Southern England. The practice of throwing seed bombs to turn vacant plots of land green took off in 1970s New York, and has been revived by green-thumbed social media influencers who defy local US regulations in a war on ugly spots in cities.","Apart from the urgent task of providing more healthy nutrients to those who increasingly cannot afford them, publicly accessible fruit and vegetable gardens connect what we eat to where it comes from, the means of production, if you will. They can make unlovely spaces lovely, and marry use and beauty as well as help promote a sense of community. Plants are also, of course, our first defence against species loss and climate change. Such planting is a small step for humanity in the right direction."],"p1Tr":["人类与自然联系的削弱或许有利于经济增长，但对人本身并不好。2020年出现了一个转折点：人造材料，如钢铁、混凝土和塑料的总重量，被发现已经超过地球上所有生命的总重量。继续扩张“混凝土森林”而不是真正的森林，是短视的。仅仅待在附近的树林里就有明显的健康益处，以至于林地信托组织成功游说医生将其作为一种健康处方。","然而，自然世界的惊奇与美正在从流行文化中消退。研究人员发现，20世纪50年代热门歌曲中每出现三个与自然有关的词，50年后只剩下略多于一个。青少年终于可以参加自然史测试，这一点来得并不算早，因为几十年来，孩子们能说出的电子游戏角色一直比野生动物物种更多。","弥补这种社会问题的一部分办法，是让议会通过“种植权”法律，允许任何人把利用不足的公共空间变成果蔬园。这个想法是让人们重新接触土壤，同时以可持续方式生产食物。","种植蔬菜有着值得尊重的传统。1649年4月，英格兰南部当地居民为应对高物价和食物短缺，在公共土地上种植蔬菜。向空地投掷“种子炸弹”让土地变绿的做法，20世纪70年代在纽约兴起，如今又被有园艺才能的社交媒体达人复兴；他们为改善城市中难看的角落，甚至挑战美国地方规定。","除了为越来越买不起健康食物的人提供更多营养这一紧迫任务外，向公众开放的果蔬园还把我们吃的东西与其来源、也就是生产方式联系起来。它们能让不好看的空间变得美观，把实用与美感结合起来，并促进社区意识。当然，植物也是我们抵御物种减少和气候变化的第一道防线。这种种植是人类朝正确方向迈出的一小步。"],"p1Questions":[{"id":46,"text":"46. What does the author want to emphasise in the first paragraph?","qtr":"作者在第一段想强调什么？","opts":[["A) The year 2020 was a big turning point in human history.","2020年是人类历史上的重大转折点。"],["B) Economic growth benefits people little in the long run.","从长远看，经济增长对人的益处很小。"],["C) It is unwise to weaken the human connection to nature.","削弱人与自然的联系是不明智的。"],["D) It is harmful to mankind to use human-made materials.","使用人造材料对人类有害。"]]},{"id":47,"text":"47. What did researchers find about popular culture?","qtr":"研究人员对流行文化有什么发现？","opts":[["A) It is increasingly detached from the natural world.","它与自然世界越来越脱离。"],["B) It is filled with all kinds of video game characters.","它充满了各种电子游戏角色。"],["C) It is especially appealing to the taste of teenagers.","它尤其迎合青少年的口味。"],["D) It is still impacted by the hit songs of the 1950s.","它仍受20世纪50年代热门歌曲的影响。"]]},{"id":48,"text":"48. What does the author propose people do?","qtr":"作者建议人们做什么？","opts":[["A) Take measures to ensure sustainable food development.","采取措施确保食品可持续发展。"],["B) Reconnect with nature through the right to grow.","通过“种植权”重新与自然建立联系。"],["C) Stand by the parliament in fighting social diseases.","支持议会应对社会问题。"],["D) Cover public spaces with fruit trees and vegetable plants.","用果树和蔬菜植物覆盖公共空间。"]]},{"id":49,"text":"49. What do we learn from the passage about vegetable planting?","qtr":"关于种植蔬菜，我们从文章中了解到什么？","opts":[["A) It all started in 1649 in Southern England.","它完全始于1649年的英格兰南部。"],["B) It is protected by US government regulations.","它受到美国政府规定保护。"],["C) It has long been used to increase food supply and improve urban landscape.","它长期被用来增加食物供给并改善城市景观。"],["D) It has been popularised worldwide with the increasing influence of social media.","随着社交媒体影响力增强，它已在全球普及。"]]},{"id":50,"text":"50. What can publicly accessible fruit and vegetable gardens do apart from their practical functions?","qtr":"向公众开放的果蔬园除了实用功能外还能做什么？","opts":[["A) Raise people's environmental awareness.","提高人们的环保意识。"],["B) Add to the great variety of plant species.","增加植物物种的多样性。"],["C) Act as the first defence against natural disasters.","成为抵御自然灾害的第一道防线。"],["D) Enhance people's community spirit.","增强人们的社区精神。"]]}],"p2Pars":["Engineering in the U.S. has long been a male-dominated profession. Fifty years ago, it looked like that might change.","In 1970, the percentage of women majoring in engineering was less than 1%. In 1979, that number was 9%. Many hoped women would continue to enter the field at the same rate. But that is not what happened. Today, only 21% of engineering majors are women, a number largely unchanged since 2000.","I am a historian who, along with my colleagues, surveyed 251 women engineers who graduated from college in the 1970s. These pioneers reflected on the challenges they faced and had advice for women entering the field today.","One survey taker explained, \"The greatest challenge for me was continuing to believe in myself when all the messages I was getting were that I would never be taken seriously or promoted or given raises at the same rate as men, who were clearly less qualified and not as smart as I was.\"","A chemical engineer who worked in manufacturing agreed, \"You have to prove yourself just because you are female. And you have to work twice as hard!\"","A civil engineer said, \"We are women engineers. People do not refer to a man as a man engineer; he is an engineer. We are constantly reminded that we do not truly belong.\" Another civil engineer stated, \"On many levels, you are never quite one of the group.\"","Women also talked about family caregiving responsibilities. A retired vice president from a major chemical company stated, \"Young women engineers are on an equal footing until they have children, then they struggle to balance work and family and compete with men who do not have the same household responsibilities.\"","But over the years things have changed a lot. Young women engineers are more accepted mostly because there are just more of them.","Many women engineers hailed the benefits of their chosen career. A program manager in manufacturing stated that engineering is the best degree. A mechanical engineer said, \"It will give you the flexibility to do almost anything. It is also satisfying to see the effects of what you have done.\""],"p2Tr":["在美国，工程行业长期以来一直是男性主导的职业。50年前，情况看起来似乎可能发生改变。","1970年，主修工程的女性比例不到1%。到1979年，这一数字达到9%。许多人希望女性会继续以同样速度进入这个领域。但事实并非如此。如今，工程专业学生中只有21%是女性，这一数字自2000年以来基本没有变化。","我是一名历史学家，我和同事调查了251位20世纪70年代大学毕业的女性工程师。这些先驱回顾了她们面对的挑战，并给今天进入该领域的女性提出建议。","一位受访者解释说：“对我来说，最大的挑战是在不断收到这些信息时仍然相信自己：我永远不会被认真对待，不会像男性那样获得晋升或加薪，而那些男性显然资历不如我，也没有我聪明。”","一位在制造业工作的化学工程师也表示认同：“你仅仅因为是女性就必须证明自己。而且你必须付出两倍努力！”","一位土木工程师说：“我们是‘女性工程师’。人们不会把男性称为‘男性工程师’，他就是工程师。我们不断被提醒，自己并不真正属于这里。”另一位土木工程师说：“在许多层面上，你永远不完全是群体中的一员。”","女性还谈到了照护家庭的责任。一位大型化工公司的退休副总裁表示：“年轻女性工程师在生孩子前处于平等地位；之后她们就要努力平衡工作和家庭，并与那些没有同样家庭责任的男性竞争。”","不过，多年来情况已经发生了很大变化。年轻女性工程师更被接受，主要是因为她们的人数变多了。","许多女性工程师称赞自己所选职业的好处。一位制造业项目经理说，工程学是最好的学位。一位机械工程师说：“它会给你几乎做任何事情的灵活性。看到自己工作的成果也令人满意。”"],"p2Questions":[{"id":51,"text":"51. What does the passage say about the engineering profession in the United States?","qtr":"文章如何描述美国的工程行业？","opts":[["A) It has seen a change in attitude towards women engineers since 1979.","自1979年以来，它对女性工程师的态度发生了变化。"],["B) It witnessed a significant increase in women engineers in the 1970s.","20世纪70年代，它见证了女性工程师数量显著增加。"],["C) It has experienced the gradual weakening of male dominance.","它经历了男性主导地位逐渐减弱的过程。"],["D) It boasted the largest number of engineering majors in 2000.","它在2000年拥有最多的工程专业学生。"]]},{"id":52,"text":"52. What does one survey taker say was her greatest challenge?","qtr":"一位受访者说她最大的挑战是什么？","opts":[["A) Not to feel superior to less qualified male engineers.","不要觉得自己优于资历较低的男性工程师。"],["B) Not to take seriously all the messages she was getting.","不要认真对待她接收到的所有信息。"],["C) Not to think highly of her qualifications when promoted or given a pay raise.","在晋升或加薪时不要高估自己的资历。"],["D) Not to lose self-confidence though constantly discouraged or unfairly treated.","尽管不断受打击或遭受不公平对待，也不要失去自信。"]]},{"id":53,"text":"53. How do women engineers frequently feel according to the two civil engineers?","qtr":"根据两位土木工程师的说法，女性工程师经常有什么感受？","opts":[["A) Disqualified on many levels.","在许多层面上不合格。"],["B) Excluded from the group.","被排除在群体之外。"],["C) Overworked by their organizations.","被所在组织过度工作。"],["D) Looked down upon by male colleagues.","被男性同事看不起。"]]},{"id":54,"text":"54. What probably makes young women engineers more accepted nowadays?","qtr":"如今年轻女性工程师更被接受的可能原因是什么？","opts":[["A) Their success in gaining an equal footing.","她们成功获得平等地位。"],["B) Their ability to balance work and family.","她们平衡工作与家庭的能力。"],["C) The change in their responsibilities.","她们职责的变化。"],["D) The increase in their number.","她们人数的增加。"]]},{"id":55,"text":"55. What can we conclude about many female engineers from the statement of a mechanical engineer?","qtr":"从一位机械工程师的话中，我们可以对许多女性工程师得出什么结论？","opts":[["A) They take great pride in their chosen career.","她们为自己选择的职业深感自豪。"],["B) They have reaped the benefits of being flexible.","她们已经从灵活性中获益。"],["C) They enjoy doing engineering to the best degree.","她们最喜欢从事工程工作。"],["D) They have proved capable of doing almost anything.","她们已经证明自己几乎能做任何事情。"]]}]};
