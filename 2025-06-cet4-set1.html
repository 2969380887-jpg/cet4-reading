function wx(text){
  var tokens=text.split(/(\s+)/g);
  var h='';
  for(var ti=0;ti<tokens.length;ti++){
    var tok=tokens[ti];
    if(/^\s+$/.test(tok)){h+=tok;continue}
    var m=tok.match(/^([^a-zA-Z0-9]*)([a-zA-Z0-9'-]+?)([^a-zA-Z0-9]*)$/);
    if(m){
      h+=esh(m[1]);var w=m[2],pc=m[3];

  return h;
}

var P=["New research suggests that pandas may be at risk of dying out because they are too comfortable. Experts say too much happiness can stop the bears from searching for new mates.", "Environmentalists have long believed that building roads or homes near the bears may threaten their survival by reducing or fragmenting their natural habitats, The Times reported. But the new research suggests that a 'modest degree of discomfort and fragmentation' may actually help preserve panda populations.", "The research was conducted by scientists from Michigan State University. It concluded that pandas fail to wander off in search of new mates if they find their habitat too comfortable, resulting in a lack of vital genetic diversity.", "For their study — outlined in a paper in the journal Conservation Biology — the team looked at genetic diversity and spread among a Chinese panda population. The ideal level of perfectly livable habitat was found to be only 80% of an area, with the remainder either too harsh or too affected by human activity.", "The experts concluded that pandas should ideally 'be happy enough to thrive, but not so content that they don't want to move around and find new mates'.", "Their conclusions about what The Guardian described as this 'sweet spot' are in line with the so-called Goldilocks principle: that there can be just the right amount of something. The concept has been applied to a wide range of disciplines, from developmental psychology to economics and engineering.", "Claudio Sillero, a professor of conservation biology at Oxford University, told the newspaper that the new findings could have implications beyond panda conservation.", "'Most large animals that eat meat live in increasingly fragmented landscapes,' said Sillero, who was not involved in the research. 'It may well be that the messy nature of their relationship with human efforts induces more animals to scatter or travel further, and might result in greater genetic connectivity and enhanced population persistence.'", "The most recent count of pandas found that there were more than 1,800 left in the wild, putting them on the list of vulnerable, but not endangered, species."];
var PT=["新的研究表明，大熊猫可能因为太过舒适而面临灭绝的风险。专家表示，过多的幸福感会让这些熊不再去寻找新的配偶。", "据《泰晤士报》报道，环保主义者长期以来一直认为，在熊猫栖息地附近修建道路或房屋可能通过减少或割裂其自然栖息地而威胁它们的生存。但新研究表明，「适度的不适和栖息地割裂」实际上可能有助于保护熊猫种群。", "该研究由密歇根州立大学的科学家进行。研究得出结论：如果熊猫发现栖息地过于舒适，就不会外出寻找新配偶，从而导致关键的遗传多样性缺失。", "在这项发表于《保护生物学》期刊的研究中，团队考察了一个中国熊猫种群的遗传多样性和分布情况。研究发现，理想的可生存栖息地仅占一个区域的80%，其余部分要么环境过于恶劣，要么受人类活动影响过大。", "专家总结道，熊猫的理想状态应该是「足够快乐以繁衍生息，但又不能太满足于现状以至于不想四处走动寻找新配偶」。", "他们对这一被《卫报》称为「最佳平衡点」的结论与所谓的金凤花原则一致：即存在恰到好处的量。这一概念已被应用于从发展心理学到经济学和工程学的广泛学科。", "牛津大学保护生物学教授Claudio Sillero告诉该报，这些新发现的意义可能超出熊猫保护的范围。", "Sillero并未参与该研究，他说：「大多数大型食肉动物生活在日益碎片化的环境中。很可能正是它们与人类活动之间那种混乱的关系，促使更多动物分散开来或走得更远，并可能导致更大的遗传连通性和更强的种群持久性。」", "最新一次熊猫数量统计发现，野外尚存超过1,800只大熊猫，这使它们被列入易危而非濒危物种名单。"];

var P2=["With those born with natural talents, it feels as if they excel without really trying. But what about those of us who don't have a natural talent? We've been told all our lives that if you work hard, you too can succeed. But with the release of Angela Duckworth's Grit, we are given a new key to success.", "'As much as talent counts, effort counts twice,' says Duckworth in Grit. She introduces a new concept that talent may be overrated, and if you want real success, what you need is grit, the perfect combination of passion and persistence. Even if you have natural talent, it's nothing without grit.", "Duckworth says grit is the difference between success and failure. A person who has grit is more likely to succeed than a person who does not. When we think about attaining success — whether it's landing that job or learning that new skill — our thoughts are immediately burdened by all the things we must first learn. If you want that new job, you have to learn the job skills, then the interview skills, then the dress part — and you must be perfect at all of them. Grit is different because it tells us that perfection isn't the goal.", "Grit lifts the unreasonable expectations off our shoulders. Grit tells us that the door is open wider than we first thought possible. Grit allows us to redefine our goals. Think about it: what's something you've always wanted to do, but gave up because you 'don't have the skills for it'? What's something you love but aren't good at?", "The real workings of grit are to have sustainable passion and continue to try. Effort means more than your natural ability. Even if you haven't mastered a skill, grit tells you that you can still succeed if you can transform your passion into action. In a way, Duckworth is giving new hope to people who have shut the doors on their dreams. She is saying it is possible that you can accomplish anything. If at first you fail, then try one more time with grit."];
var PT2=["对于天生有才华的人来说，他们似乎不费吹灰之力就能出类拔萃。但那些没有天赋的人呢？我们一生都被教导：如果你努力工作，你也能成功。但随着Angela Duckworth《Grit》一书的出版，我们获得了通往成功的一把新钥匙。", "Duckworth在书中说：「天赋固然重要，但努力的重要性是天赋的两倍。」她提出了一个新概念：天赋可能被高估了，如果你想要真正的成功，你需要的是grit——即激情与坚持的完美结合。即使你有天赋，没有grit也毫无意义。", "Duckworth说，grit是成功与失败的分水岭。有grit的人比没有的人更可能成功。当我们思考如何获得成功——无论是找到那份工作还是学会那项新技能——我们的思绪立刻被所有必须学的东西压得喘不过气来。想要那份新工作，你得学会工作技能，然后学会面试技巧，然后学会着装——你必须在所有这些方面做到完美。而Grit不同，它告诉我们完美不是目标。", "Grit将不合理的期望从我们肩上卸下。Grit告诉我们，大门比我们最初想象的敞得更开。Grit让我们重新定义目标。想一想：有什么事是你一直想做、却因为「没有相应技能」而放弃的？什么事是你喜欢却不太擅长的？", "Grit的真正运作方式是拥有可持续的热情并持续尝试。努力比天赋更有意义。即使你还没有掌握一项技能，grit告诉你，如果你能把热情转化为行动，你仍然可以成功。在某种程度上，Duckworth在给那些已经关上梦想之门的人带来新的希望。她在说，你完全可以成就任何事情。如果你一开始失败了，那就带着grit再试一次。"];
