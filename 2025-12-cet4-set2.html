var DATA={"file":"2025-12-cet4-set2.html","dateTitle":"2025年12月","dateShort":"2025.12","set":"第2套","p1Small":"健康饮食","p2Small":"婴儿梦境","p1Title":"Healthy Eating and Teen Values","p2Title":"When Babies Start Dreaming","saPars":["Some music inspires you to move your feet, some inspires you to get out there and change the world. In any case, it is __26__ to say that music moves people in special ways.","If you are especially into a piece of music, your brain does something called Autonomous Sensory Meridian Response, or ASMR, which __27__ to you like a sting in your brain.","It turns out that ASMR is pretty special. According to a __28__ published study in The Journal of Prevention of Alzheimer's Disease, the part of your brain responsible for ASMR does not get lost to Alzheimer's. Alzheimer's __29__ to put people into layers of confusion, and the study confirms that music can sometimes __30__ lift people out of the Alzheimer's haze and bring them back to at least a likeness of normality, if only for a short while. ASMR is powerful stuff!","This phenomenon has been __31__ several times but rarely studied properly. One of the most famous examples of this is the story of 92-year-old Henry Dryer, who comes out of dementia while listening to songs from his youth.","Jeff Anderson, associate professor in Radiology at the University of Utah and __32__ author on the study, says, \"In our society, the diagnoses of dementia are __33__ resources to the maximum. No one says playing music will be a cure for Alzheimer's disease, but it might make the symptoms more __34__, decrease the cost of care and improve a patient's __35__ of life.\""],"saTr":["有些音乐会激励你舞动双脚，有些音乐会激励你走出去改变世界。无论如何，可以公平地说，音乐以特殊方式打动着人们。","如果你特别喜欢一段音乐，你的大脑会产生一种叫作自主感觉经络反应（ASMR）的现象，它给你的感觉就像大脑里出现一阵刺痛。","事实证明，ASMR十分特别。根据最近发表在《阿尔茨海默病预防杂志》上的一项研究，大脑中负责ASMR的部分不会因阿尔茨海默病而消失。阿尔茨海默病往往会让人陷入层层混乱，而该研究证实，音乐有时确实能把人从阿尔茨海默病的迷雾中拉出来，让他们至少短暂恢复到接近正常的状态。ASMR的力量很强大。","这种现象已被观察到多次，却很少得到恰当研究。最著名的例子之一，是92岁的亨利·德赖尔在听到年轻时的歌曲时，暂时摆脱痴呆状态的故事。","犹他大学放射学副教授、该研究共同作者杰夫·安德森说：“在我们的社会中，痴呆诊断正在最大程度消耗资源。没有人说播放音乐能治愈阿尔茨海默病，但它可能让症状更容易控制，降低护理成本，并提高患者的生活质量。”"],"bank":["A) actually","B) consequently","C) contributing","D) fair","E) feels","F) manageable","G) mends","H) observed","I) phase","J) plotting","K) quality","L) recently","M) taxing","N) tends","O) yielded"],"p1Pars":["Junk food is now a staple of many Americans' diets. Advertising campaigns from the snack food companies, often featuring sports stars, send the message that we can neutralize any negative effects of consuming their products simply by getting more physical exercise. But recent studies show a lack of exercise is not to blame for rising obesity rates. Bad diets are.","Interventions to help reduce junk food consumption are especially important for children and teenagers. Prevention is better than cure because obesity is so difficult to treat. Unfortunately, while health education has shown some success among young children, teens have been harder to reach.","Now a large-scale study has tried an innovative approach to change teenagers' attitudes towards healthy eating, and the results are promising. The researchers argued that previous interventions have probably been unsuccessful because of a major flaw: they focused on a future, healthier you and assumed that this would be enough motivation for teenagers. In contrast, the new intervention cleverly exploits teenagers' instinct for rebelliousness and autonomy, and the value they place on social justice.","To do this, researchers had students read an article on the food industry. It revealed a secret about the manipulative and deceptive strategies used to make junk food more addictive and characterize the products as healthy. The article also explained how advertising campaigns specifically target very young and poor people, causing harm for these vulnerable groups. Afterwards, the participants read a fictional survey of teens who wanted to fight back against the companies by buying and eating less processed food.","After the intervention, participants associated healthy eating with autonomy and social justice. The teenagers also rated healthy eating as being more appealing. Importantly, there were also some promising effects of the new intervention on actual behavior. A day later the students were offered a choice of snacks and drinks in a seemingly unrelated context. The teens chose healthy snacks and drinks, such as fruit or water, more often over unhealthy options, like biscuits and soda. Apparently associating a healthy diet with teenagers' own values seems to be a promising avenue to prevent obesity."],"p1Tr":["垃圾食品如今已成为许多美国人饮食中的常见组成部分。零食公司的广告宣传经常让体育明星出镜，传递这样一种信息：只要进行更多体育锻炼，我们就能抵消食用这些产品带来的任何负面影响。但最近研究表明，肥胖率上升并不能归咎于缺乏锻炼，糟糕的饮食才是原因。","帮助减少垃圾食品消费的干预措施，对儿童和青少年尤其重要。预防胜于治疗，因为肥胖非常难治。不幸的是，健康教育虽然在年幼儿童中取得了一些成功，却更难触及青少年。","现在，一项大规模研究尝试用创新方法改变青少年对健康饮食的态度，结果很有希望。研究人员认为，此前干预措施可能没有成功，是因为存在一个重大缺陷：它们关注未来更健康的你，并假设这足以激励青少年。相比之下，新的干预巧妙利用了青少年反叛和自主的本能，以及他们对社会正义的重视。","为此，研究人员让学生阅读一篇关于食品行业的文章。文章揭示了一个秘密：食品行业使用操控性和欺骗性策略，让垃圾食品更容易使人上瘾，并把产品塑造成健康食品。文章还解释了广告宣传如何专门针对年幼者和贫困者，从而伤害这些脆弱群体。之后，参与者阅读了一项虚构的青少年调查，其中的青少年希望通过少买、少吃加工食品来“反击”这些公司。","干预之后，参与者把健康饮食与自主和社会正义联系起来。青少年还认为健康饮食更有吸引力。重要的是，新干预对实际行为也产生了一些有希望的影响。一天后，学生在一个看似无关的情境中被提供零食和饮料选择。青少年更常选择水果或水等健康食品，而不是饼干和汽水等不健康选项。显然，把健康饮食与青少年自己的价值观联系起来，似乎是预防肥胖的一条有希望的道路。"],"p1Questions":[{"id":46,"text":"46. What do we learn about advertising campaigns from the snack food companies?","qtr":"关于零食公司的广告宣传，我们了解到什么？","opts":[["A) They convey the idea that their products are okay if consumers exercise more.","它们传递这样一种观念：消费者多锻炼，产品就没问题。"],["B) They send the message that bad diets are responsible for Americans' obesity.","它们传递糟糕饮食导致美国人肥胖的信息。"],["C) They usually feature sports stars to emphasize the benefits of their snack foods.","它们通常让体育明星出镜，以强调零食的好处。"],["D) They claim that lack of exercise is to blame for the increasing obesity rates.","它们声称肥胖率上升应归咎于缺乏锻炼。"]]},{"id":47,"text":"47. What does the passage say about health education?","qtr":"文章如何描述健康教育？","opts":[["A) It has shed light on teens' instinct for rebellion and autonomy.","它揭示了青少年反叛和自主的本能。"],["B) It has placed much more emphasis on cure than on prevention.","它更重视治疗而非预防。"],["C) It has contributed little to the campaigns against obesity.","它对反肥胖行动贡献很小。"],["D) It has largely failed to turn teens away from junk food.","它在让青少年远离垃圾食品方面大体失败了。"]]},{"id":48,"text":"48. What is a major flaw in previous interventions to help reduce junk food consumption?","qtr":"此前帮助减少垃圾食品消费的干预措施有何重大缺陷？","opts":[["A) They motivated teens to stay away from junk food only temporarily.","它们只能暂时激励青少年远离垃圾食品。"],["B) They focused on the benefits young people would reap in the future.","它们关注年轻人未来会获得的好处。"],["C) They were based on the assumption that motivation was the only key.","它们基于动机是唯一关键的假设。"],["D) They were incapable of appealing to teens' instinct for rebelliousness.","它们无法吸引青少年的反叛本能。"]]},{"id":49,"text":"49. In what way is the new intervention innovative?","qtr":"新的干预方式创新在哪里？","opts":[["A) It emphasizes people's sense of social responsibility.","它强调人们的社会责任感。"],["B) It cleverly exploits teenagers' personal weaknesses.","它巧妙利用青少年的个人弱点。"],["C) It takes advantage of teenagers' natural inclination.","它利用青少年的自然倾向。"],["D) It promises immediate rather than future benefits.","它承诺即时而非未来的好处。"]]},{"id":50,"text":"50. What conclusion can be drawn from the new research?","qtr":"可以从新研究中得出什么结论？","opts":[["A) A totally different approach could be adopted to combat advertising campaigns for snack food.","可以采用完全不同的方法对抗零食广告宣传。"],["B) An effective intervention has to be found to persuade teenagers to switch to a healthier lifestyle.","必须找到有效干预来说服青少年转向更健康生活方式。"],["C) Obesity can be hopefully prevented by building links between teenagers' values and healthy eating.","把青少年价值观与健康饮食联系起来，有望预防肥胖。"],["D) An innovative way to beat obesity is to expose food companies' manipulative and deceptive practices.","战胜肥胖的创新方式是揭露食品公司的操控和欺骗做法。"]]}],"p2Pars":["Adults dream during REM, or rapid eye movement, sleep and infants have loads of REM. So, it might be fair to assume that babies have tons of dreams.","But scientists believe REM serves a completely different purpose for newborns and infants than dreaming. When babies are in REM, it allows their brain to develop pathways, connections, and eventually, learn languages.","Since your baby does not dream at this stage of brain development, it is safe to assume babies do not have nightmares, either. Nightmares stem from exposure to trauma, an overactive imagination, and the normal stresses of everyday life.","Are you wondering, what do babies dream about? Good question, but the answer is nothing!","So, when do babies start dreaming? The general consensus is that they start dreaming around the age of two. Psychologist David Foulkes studies children, from very small kids to teens, to bring the secrets of their dreams to the light of day. In his lab, he lets kids fall asleep and then wakes them three times a night and asks them to describe what they recall.","Foulkes' findings are unsurprising. Basically, little kids have little dreams. But exactly what kids see while dreaming depends on their age. As children develop and grow, their dreams do too.","Dreams of very small kids are usually just snapshots, looking much more like a slideshow than a movie when compared to the dreams of adults. They heavily feature animals and other familiar sights, like images of people eating. According to Foulkes, children's dream life seems to be similar to their waking imagination and narration. Kids ages five to nine begin seeing moving images and characters in action. Dreams now include multiple events strung together, one after the other. They also start developing greater ability to remember dreams. Still, that is not always the case: When roused during REM sleep, 25% of the kids in Foulkes' studies had no recollection of dreaming, a trend that continues through age nine.","So, if your baby seems to be in a stressful state while sleeping or is upset upon waking, there may be other factors at play."],"p2Tr":["成年人会在快速眼动睡眠期间做梦，而婴儿拥有大量快速眼动睡眠。因此，认为婴儿会做很多梦似乎是合理的。","但科学家认为，对于新生儿和婴儿来说，快速眼动睡眠发挥的作用与做梦完全不同。婴儿处于快速眼动睡眠时，这能让他们的大脑发展神经通路和连接，并最终学习语言。","由于婴儿在这一大脑发育阶段不会做梦，因此也可以认为婴儿不会做噩梦。噩梦源自创伤经历、过度活跃的想象力以及日常生活中的正常压力。","你是否想知道婴儿会梦到什么？这是个好问题，但答案是什么也没有。","那么，婴儿什么时候开始做梦？普遍共识是，他们大约从两岁开始做梦。心理学家戴维·福克斯研究从幼儿到青少年的儿童，以揭示他们梦境的秘密。在实验室中，他让孩子入睡，然后一夜叫醒他们三次，并让他们描述自己记得的内容。","福克斯的发现并不令人惊讶。简单说，小孩子的梦也很简单。但孩子做梦时具体看到什么，取决于他们的年龄。随着儿童发育成长，他们的梦也随之发展。","年幼儿童的梦通常只是一些快照；与成年人的梦相比，它们更像幻灯片，而不是电影。梦中大量出现动物和其他熟悉景象，例如人们吃东西的画面。福克斯认为，儿童的梦境生活似乎与他们清醒时的想象和叙述相似。五到九岁的孩子开始看到移动画面和行动中的人物。此时，梦会包含多个前后连接的事件。他们记住梦境的能力也开始增强。不过情况并非总是如此：在快速眼动睡眠中被叫醒时，福克斯研究中的25%儿童完全不记得自己做梦，这一趋势一直持续到九岁。","因此，如果婴儿睡觉时显得紧张，或醒来时情绪不安，可能是其他因素在起作用。"],"p2Questions":[{"id":51,"text":"51. What do scientists think of REM?","qtr":"科学家如何看待快速眼动睡眠？","opts":[["A) It is a sign of dreaming in adults and infants alike.","它是成年人和婴儿做梦的共同标志。"],["B) It is essential to human beings' language learning.","它对人类语言学习至关重要。"],["C) It determines the formation of connections in the brain.","它决定大脑连接的形成。"],["D) It performs a different function in babies than in adults.","它在婴儿和成年人身上发挥不同作用。"]]},{"id":52,"text":"52. What can we infer about nightmares from the passage?","qtr":"关于噩梦，可以从文章中推断出什么？","opts":[["A) They occur often in people with an active imagination.","它们经常出现在想象活跃的人身上。"],["B) They occur in people suffering from emotional stress.","它们会出现在承受情绪压力的人身上。"],["C) They vary in different stages of brain development.","它们在大脑发育不同阶段有所不同。"],["D) They appear in the sleep of both adults and infants.","它们会出现在成年人和婴儿睡眠中。"]]},{"id":53,"text":"53. What is the aim of psychologist David Foulkes' study?","qtr":"心理学家戴维·福克斯研究的目的是什么？","opts":[["A) To reveal the secrets of children's dreams.","揭示儿童梦境的秘密。"],["B) To see if children start dreaming at age two.","观察儿童是否从两岁开始做梦。"],["C) To solve the mystery of dreaming and brain growth.","解开做梦与大脑成长的谜团。"],["D) To confirm the general consensus on when kids dream.","确认关于儿童何时做梦的普遍共识。"]]},{"id":54,"text":"54. What are Foulkes' findings about kids' dreams?","qtr":"福克斯关于儿童梦境有什么发现？","opts":[["A) They feature strange animals.","它们以奇怪动物为主要内容。"],["B) They are unsurprising to adults.","它们对成年人来说并不意外。"],["C) They grow and evolve with age.","它们随年龄增长而发展变化。"],["D) They reflect kids' waking life.","它们反映儿童清醒时的生活。"]]},{"id":55,"text":"55. What can we assume about babies who appear upset upon waking?","qtr":"对于醒来时显得不安的婴儿，我们可以作何推断？","opts":[["A) They have been roused against their will.","他们被不情愿地叫醒了。"],["B) They have been disturbed by a nightmare.","他们受到噩梦干扰。"],["C) They have trouble recollecting the images of their dreams.","他们难以回忆梦中画面。"],["D) They have been affected by something other than dreaming.","他们受到做梦以外其他因素影响。"]]}]};

document.getElementById('sap').innerHTML=renderParas(DATA.saPars,DATA.saTr,'sa',true);document.getElementById('sab').innerHTML=DATA.bank.map(function(x){return '<span>'+wx(x)+'</span>'}).join(' ');document.getElementById('p1c').innerHTML=renderParas(DATA.p1Pars,DATA.p1Tr,'p1',false);document.getElementById('p2c').innerHTML=renderParas(DATA.p2Pars,DATA.p2Tr,'p2',false);document.getElementById('p1q').innerHTML=DATA.p1Questions.map(mq).join('');document.getElementById('p2q').innerHTML=DATA.p2Questions.map(mq).join('');
